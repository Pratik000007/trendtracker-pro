name: TrendTracker - Verify Deployment

on:
  push:
    branches: [main, master]
    paths:
      - 'reports/**'
      - 'dashboard_v2.py'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Verify dashboard starts
        run: |
          timeout 10 streamlit run dashboard_v2.py --server.headless true || true
          echo "✅ Dashboard verification complete"
      
      - name: Summary
        run: |
          echo "## Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "✅ Code pushed to main branch" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Streamlit Cloud" >> $GITHUB_STEP_SUMMARY
          echo "Auto-deploys from main branch" >> $GITHUB_STEP_SUMMARY
          echo "Dashboard: \`dashboard_v2.py\`" >> $GITHUB_STEP_SUMMARY
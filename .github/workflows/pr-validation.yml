name: TrendTracker - PR Validation

on:
  pull_request:
    branches: [main, master]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Check syntax
        run: |
          python -m py_compile main.py
          python -m py_compile dashboard_v2.py
          echo "✅ Syntax check passed"
      
      - name: Test imports
        run: |
          python -c "from collectors.youtube_collector import YouTubeCollector"
          python -c "from collectors.hackernews_collector import HackerNewsCollector"
          python -c "from collectors.devto_collector import DevToCollector"
          python -c "from collectors.github_collector import GitHubCollector"
          python -c "from analysis.trend_analyzer import TrendAnalyzer"
          echo "✅ All imports successful"
      
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
      
      - name: Type check with mypy
        run: |
          pip install mypy
          mypy collectors/ analysis/ --ignore-missing-imports || trues